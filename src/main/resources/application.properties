spring.application.name=spring-boot-book-store
spring.datasource.url=jdbc:mysql://localhost:3307/book-store?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.servlet.context-path=/api

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.docker.compose.enabled=true
spring.docker.compose.connection.enabled=false
spring.docker.compose.lifecycle-management=start_only

jwt.expiration=300000
jwt.secret=mysupersecretkey_mysupersecretkey_12345

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
